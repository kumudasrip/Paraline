    <!-- Scroll to Top Button Styling -->
    <style>
      #scrollToTopBtn {
        position: fixed; 
        bottom: 25px;    
        right: 25px;       
        z-index: 99999;  
        width: 44px;       
        height: 44px;      
        border: 1px solid rgba(255, 255, 255, 0.1); 
        outline: none;
        background: rgba(13, 27, 42, 0.6); /* Translucent premium dark background */
        backdrop-filter: blur(10px);       /* Frosted glass effect */
        -webkit-backdrop-filter: blur(10px);
        color: rgba(255, 255, 255, 0.5);   /* Muted gray arrow icon */
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), 0 0 10px rgba(125, 211, 252, 0.15); /* Soft ambient sky blue glow */
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px); /* Premium entrance animation offset */
        transition: 
          opacity 0.3s ease, 
          transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
          background-color 0.3s ease, 
          color 0.3s ease, 
          border-color 0.3s ease, 
          box-shadow 0.3s ease;
      }

      #scrollToTopBtn.visible {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      #scrollToTopBtn:hover {
        background: rgba(13, 27, 42, 0.9);
        color: #ffffff;
        transform: translateY(-3px); /* Subtle hover lift */
        border-color: rgba(125, 211, 252, 0.45); /* Matches site's cyan/sky-blue accent (#7dd3fc) */
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4), 0 0 14px rgba(125, 211, 252, 0.35); /* Amplified glowing shadow */
      }
      
      #scrollToTopBtn:active {
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <button id="scrollToTopBtn" title="Go to top" aria-label="Scroll to top">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>

    <script>
      (() => {
        const btn = document.getElementById("scrollToTopBtn");
        if (!btn) return;

        // Passive scroll event listener for 60fps/120fps scrolling performance
        window.addEventListener("scroll", () => {
          if (window.scrollY > 300) {
            btn.classList.add("visible");
          } else {
            btn.classList.remove("visible");
          }
        }, { passive: true });

        // Smooth scroll to top click handler
        btn.addEventListener("click", () => {
          window.scrollTo({
            top: 0,
            behavior: "smooth"
          });
        });
      })();
    </script>
  </body>
</html>
