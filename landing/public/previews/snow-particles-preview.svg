<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1520"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="50%" cy="8%" r="52%">
      <stop offset="0%" stop-color="rgba(118,156,255,0.18)"/>
      <stop offset="52%" stop-color="rgba(255,92,122,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

