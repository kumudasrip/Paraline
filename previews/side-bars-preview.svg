<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1520"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="leftBars" fill="#8ee9ff" filter="url(#glow)">
      <rect x="48" y="76" width="28" height="4" rx="2">
        <animate attributeName="width" values="18;28;18" dur="2.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="102" width="40" height="4" rx="2">
        <animate attributeName="width" values="22;40;22" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="128" width="54" height="4" rx="2">
        <animate attributeName="width" values="28;54;28" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="154" width="74" height="4" rx="2">
        <animate attributeName="width" values="38;74;38" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="180" width="92" height="4" rx="2">
        <animate attributeName="width" values="44;92;44" dur="1.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="206" width="74" height="4" rx="2">
        <animate attributeName="width" values="38;74;38" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="232" width="54" height="4" rx="2">
        <animate attributeName="width" values="28;54;28" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="258" width="40" height="4" rx="2">
        <animate attributeName="width" values="22;40;22" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="284" width="28" height="4" rx="2">
        <animate attributeName="width" values="18;28;18" dur="2.8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </defs>

  <rect width="640" height="360" rx="32" fill="url(#bg)"/>
  <rect x="34" y="34" width="572" height="292" rx="26" fill="#07111a" stroke="rgba(255,255,255,0.06)"/>
  <use href="#leftBars"/>
  <use href="#leftBars" transform="translate(640 0) scale(-1 1)"/>
</svg>
