<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1520"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0, 229, 255, 0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="rgba(255, 45, 123, 0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="640" height="360" rx="32" fill="url(#bg)"/>
  <rect x="34" y="34" width="572" height="292" rx="26" fill="#07111a" stroke="rgba(255,255,255,0.06)"/>
  <rect x="34" y="34" width="48" height="292" fill="url(#leftGlow)"/>
  <rect x="558" y="34" width="48" height="292" fill="url(#rightGlow)"/>

  <!-- Left Side Braids -->
  <g filter="url(#glow)">
    <!-- Cyan Strand -->
    <path d="M 46 34 C 54 75, 38 116, 46 157 C 54 198, 38 239, 46 280 C 50 300, 42 315, 46 326" fill="none" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
      <animate attributeName="opacity" values="0.75;0.95;0.75" dur="3.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 1.5 0; -0.5 0; 0 0" dur="4.1s" repeatCount="indefinite"/>
    </path>
    <!-- Pink Strand -->
    <path d="M 46 34 C 38 75, 54 116, 46 157 C 38 198, 54 239, 46 280 C 42 300, 50 315, 46 326" fill="none" stroke="#ff2d7b" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
      <animate attributeName="opacity" values="0.95;0.75;0.95" dur="3.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -1.5 0; 0.5 0; 0 0" dur="4.1s" repeatCount="indefinite"/>
    </path>
    <!-- Purple/White Highlight Strand -->
    <path d="M 46 34 C 46 75, 46 116, 46 157 C 46 198, 46 239, 46 280 C 46 300, 46 315, 46 326" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.45" stroke-dasharray="8 6">
      <animate attributeName="stroke-dashoffset" values="50;0" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Right Side Braids -->
  <g transform="translate(640 0) scale(-1 1)" filter="url(#glow)">
    <!-- Cyan Strand -->
    <path d="M 46 34 C 54 75, 38 116, 46 157 C 54 198, 38 239, 46 280 C 50 300, 42 315, 46 326" fill="none" stroke="#ff2d7b" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
      <animate attributeName="opacity" values="0.75;0.95;0.75" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 1.5 0; -0.5 0; 0 0" dur="4.5s" repeatCount="indefinite"/>
    </path>
    <!-- Pink Strand -->
    <path d="M 46 34 C 38 75, 54 116, 46 157 C 38 198, 54 239, 46 280 C 42 300, 50 315, 46 326" fill="none" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
      <animate attributeName="opacity" values="0.95;0.75;0.95" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; -1.5 0; 0.5 0; 0 0" dur="4.5s" repeatCount="indefinite"/>
    </path>
    <!-- Purple/White Highlight Strand -->
    <path d="M 46 34 C 46 75, 46 116, 46 157 C 46 198, 46 239, 46 280 C 46 300, 46 315, 46 326" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.45" stroke-dasharray="8 6">
      <animate attributeName="stroke-dashoffset" values="50;0" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
