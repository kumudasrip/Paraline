<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1520"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fe2ff"/>
      <stop offset="55%" stop-color="#f4c0ff"/>
      <stop offset="100%" stop-color="#ffd8a6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="640" height="360" rx="32" fill="url(#bg)"/>
  <rect x="34" y="34" width="572" height="292" rx="26" fill="#07111a" stroke="rgba(255,255,255,0.06)"/>
  <rect x="48" y="48" width="544" height="264" rx="24" fill="none" stroke="#7bc4ea" stroke-width="1.6" opacity="0.16"/>
  <rect x="48" y="48" width="544" height="264" rx="24" fill="none" stroke="url(#edge)" stroke-width="4.5" opacity="0.52" filter="url(#glow)">
    <animate attributeName="opacity" values="0.28;0.88;0.38;0.8;0.28" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="3.2;5.6;3.4;5.1;3.2" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="58" y="58" width="524" height="244" rx="18" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.08">
    <animate attributeName="opacity" values="0.04;0.12;0.04" dur="2.4s" repeatCount="indefinite"/>
  </rect>
</svg>
