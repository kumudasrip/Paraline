<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Paraline architecture diagram</title>
  <desc id="desc">A layered diagram showing the Electron main process, preload bridge, renderer, settings UI, native audio helper, and theme assets with arrows for data flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111d"/>
      <stop offset="100%" stop-color="#0b1828"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0c2235"/>
      <stop offset="100%" stop-color="#0a1622"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8fd8ff"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 32px/1.2 Inter, Segoe UI, Arial, sans-serif; fill: #e8f5ff; }
      .subtitle { font: 500 15px/1.4 Inter, Segoe UI, Arial, sans-serif; fill: #9eb8cc; }
      .lane { fill: rgba(255,255,255,0.02); stroke: rgba(160,200,230,0.12); stroke-width: 1.2; rx: 20; }
      .card { fill: url(#panel); stroke: rgba(160,220,255,0.24); stroke-width: 1.2; rx: 18; filter: url(#shadow); }
      .cardTitle { font: 700 18px/1.2 Inter, Segoe UI, Arial, sans-serif; fill: #f1fbff; }
      .cardBody { font: 500 14px/1.45 Inter, Segoe UI, Arial, sans-serif; fill: #b8d0e1; }
      .tag { font: 700 12px/1 Inter, Segoe UI, Arial, sans-serif; fill: #06131f; }
      .chip { fill: #8fd8ff; }
      .chip2 { fill: #b8a1ff; }
      .chip3 { fill: #f8a7cb; }
      .arrow { stroke: #8fd8ff; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrowSoft { stroke: #6ccff6; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-dasharray: 0; }
      .note { font: 500 13px/1.4 Inter, Segoe UI, Arial, sans-serif; fill: #97b4c8; }
      .label { font: 700 12px/1 Inter, Segoe UI, Arial, sans-serif; fill: #8fe1ff; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1400" height="920" fill="url(#bg)"/>
  <rect x="40" y="40" width="1320" height="840" rx="28" fill="rgba(255,255,255,0.02)" stroke="rgba(160,200,230,0.10)"/>

  <text x="74" y="98" class="title">Paraline architecture</text>
  <text x="74" y="126" class="subtitle">Audio capture → Electron main process → preload bridge → overlay renderer</text>

  <!-- Lane 1: Capture Layer -->
  <rect x="70" y="165" width="1260" height="125" class="lane"/>
  <text x="92" y="198" class="label">CAPTURE LAYER (NATIVE WINDOWS HOST)</text>

  <rect x="475" y="210" width="450" height="68" class="card"/>
  <rect x="493" y="222" width="128" height="20" rx="10" class="chip"/>
  <text x="505" y="236" class="tag">NATIVE HELPER</text>
  <text x="635" y="236" class="cardTitle">Paraline.AudioBridge.exe (Program.cs)</text>
  <text x="493" y="262" class="cardBody">Captures Windows system audio via WASAPI Loopback and writes JSON RMS levels to stdout</text>

  <!-- Lane 2: Host Layer -->
  <rect x="70" y="320" width="1260" height="160" class="lane"/>
  <text x="92" y="353" class="label">HOST LAYER (ELECTRON MAIN PROCESS - NODE.JS)</text>

  <rect x="120" y="365" width="340" height="100" class="card"/>
  <rect x="138" y="377" width="128" height="20" rx="10" class="chip2"/>
  <text x="150" y="391" class="tag">IPC CONDUIT</text>
  <text x="138" y="420" class="cardTitle">audioBridge.js</text>
  <text x="138" y="442" class="cardBody">Spawns helper, parses JSON stdout stream,</text>
  <text x="138" y="458" class="cardBody">and manages simulated audio fallback</text>

  <rect x="500" y="365" width="380" height="100" class="card"/>
  <rect x="518" y="377" width="104" height="20" rx="10" class="chip"/>
  <text x="530" y="391" class="tag">MAIN PROCESS</text>
  <text x="518" y="420" class="cardTitle">main.js</text>
  <text x="518" y="442" class="cardBody">Manages app lifecycle, tray menus, window routing,</text>
  <text x="518" y="458" class="cardBody">and distributes IPC payloads to active renderers</text>

  <rect x="920" y="365" width="360" height="100" class="card"/>
  <rect x="938" y="377" width="114" height="20" rx="10" class="chip3"/>
  <text x="950" y="391" class="tag">SETTINGS DB</text>
  <text x="938" y="420" class="cardTitle">settingsStore.js</text>
  <text x="938" y="442" class="cardBody">Handles settings validation (sanitization), theme profiles,</text>
  <text x="938" y="458" class="cardBody">and persists configurations safely to disk</text>

  <!-- Lane 3: Preload Layer -->
  <rect x="70" y="510" width="1260" height="100" class="lane"/>
  <text x="92" y="543" class="label">PRELOAD LAYER (IPC BRIDGE &amp; SANDBOX SECURITY)</text>

  <rect x="450" y="530" width="500" height="68" class="card"/>
  <rect x="468" y="542" width="124" height="20" rx="10" class="chip2"/>
  <text x="480" y="556" class="tag">CONTEXT BRIDGE</text>
  <text x="605" y="557" class="cardTitle">preload.js</text>
  <text x="468" y="584" class="cardBody">Exposes safe, isolated APIs (audioBridge, visualizerSettings, paralineApp) to renderers</text>

  <!-- Lane 4: Renderer Layer -->
  <rect x="70" y="640" width="1260" height="180" class="lane"/>
  <text x="92" y="673" class="label">RENDERER LAYER (CHROMIUM FRONTEND RUNTIMES)</text>

  <rect x="100" y="685" width="340" height="115" class="card"/>
  <rect x="118" y="697" width="112" height="20" rx="10" class="chip3"/>
  <text x="130" y="711" class="tag">OVERLAY VIEW</text>
  <text x="118" y="736" class="cardTitle">renderer.js &amp; index.html</text>
  <text x="118" y="758" class="cardBody">Runs the primary animation loop and manages</text>
  <text x="118" y="774" class="cardBody">transparent canvas rendering updates</text>

  <rect x="480" y="685" width="440" height="115" class="card"/>
  <rect x="498" y="697" width="112" height="20" rx="10" class="chip"/>
  <text x="510" y="711" class="tag">THEME PLUGINS</text>
  <text x="498" y="736" class="cardTitle">themes/ directory</text>
  <text x="498" y="758" class="cardBody">Modular themes (ambientWave, reactiveBorder, etc.) that draw</text>
  <text x="498" y="774" class="cardBody">beautiful audio-reactive waves and borders onto the canvas</text>

  <rect x="960" y="685" width="340" height="115" class="card"/>
  <rect x="978" y="697" width="122" height="20" rx="10" class="chip2"/>
  <text x="990" y="711" class="tag">CONTROL PANEL</text>
  <text x="978" y="736" class="cardTitle">settings.js &amp; settings.html</text>
  <text x="978" y="758" class="cardBody">Controls general settings, fine-tunes custom theme</text>
  <text x="978" y="774" class="cardBody">properties, and handles theme profile import/export</text>

  <!-- Connective Flows (Arrows) -->
  <!-- 1. Native Audio capture to audioBridge.js -->
  <path d="M 700 278 C 700 320, 290 320, 290 365" class="arrowSoft"/>
  
  <!-- 2. audioBridge.js to main.js -->
  <path d="M 460 415 L 500 415" class="arrow"/>
  
  <!-- 3. main.js to settingsStore.js (Bi-directional Settings persistence) -->
  <path d="M 880 415 L 920 415" class="arrow"/>

  <!-- 4. main.js down through preload.js to OVERLAY RENDERER -->
  <path d="M 560 465 C 560 520, 270 590, 270 685" class="arrowSoft"/>

  <!-- 5. main.js down through preload.js to SETTINGS UI -->
  <path d="M 820 465 C 820 520, 1130 590, 1130 685" class="arrowSoft"/>

  <!-- 6. OVERLAY RENDERER to THEME PLUGINS -->
  <path d="M 440 742.5 L 480 742.5" class="arrow"/>

  <text x="123" y="882" class="note">Renderer stays isolated from Node.js. The helper is optional and main.js falls back to simulated audio if it is missing.</text>
</svg>
